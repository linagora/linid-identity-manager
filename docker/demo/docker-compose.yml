name: test

services:
  mock-api:
    image: mock-api
    container_name: mock-api
    ports:
      - 3000:3000
    networks:
      - demo-network

  linid-im-database:
    image: postgres:18
    container_name: linid-im-database
    networks:
      - demo-network
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - ${DATABASE_PORT}:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  linid-im-database-migration:
    image: flyway/flyway:12
    container_name: linid-im-database-migration
    command: migrate
    networks:
      - demo-network
    environment:
      FLYWAY_URL: jdbc:postgresql://linid-im-database:5432/${DATABASE_NAME}
      FLYWAY_USER: ${DATABASE_USER}
      FLYWAY_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - ../linid-im-database/migration:/flyway/sql
    depends_on:
      linid-im-database:
        condition: service_healthy

  linid-im-api:
    image: linid-im-api
    container_name: linid-im-api
    networks:
      - demo-network
    ports:
      - 8080:8080
    volumes:
      - ../plugins:/plugins
      - ./resources/config.yaml:/config/config.yaml
      - ./resources/api-i18n:/i18n
    environment:
      - CONFIGURATION_PATH=${CONFIGURATION_PATH}
      - PLUGIN_LOADER_PATH=${PLUGIN_LOADER_PATH}
      - I18N_EXTERNAL_PATH=${I18N_EXTERNAL_PATH}
      - AUTHORIZATION_ACCEPT_ALLOW_ALL=${AUTHORIZATION_ACCEPT_ALLOW_ALL}

  linid-im-front:
    image: linid-im-front
    container_name: linid-im-front
    networks:
      - demo-network
    ports:
      - 9000:80
    volumes:
      - ./resources/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./resources/design.json:/usr/share/nginx/html/design.json:ro
      - ./resources/i18n.json:/usr/share/nginx/html/i18n.json:ro
      - ./resources/front-i18n/fr-FR.json:/usr/share/nginx/html/i18n/fr-FR.json:ro
      - ./resources/front-i18n/en-US.json:/usr/share/nginx/html/i18n/en-US.json:ro
      - ./resources/modules.json:/usr/share/nginx/html/modules.json:ro
      - ./resources/moduleUsers.json:/usr/share/nginx/html/moduleUsers.json:ro
      - ./resources/remotes.json:/usr/share/nginx/html/remotes.json:ro

  catalog-ui:
    image: catalog-ui
    container_name: catalog-ui
    networks:
      - demo-network
    volumes:
      - ./resources/nginx-modules.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - linid-im-front

  module-users:
    image: module-users
    container_name: module-users
    networks:
      - demo-network
    volumes:
      - ./resources/nginx-modules.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - linid-im-front

networks:
  demo-network:
    name: demo-network
    driver: bridge
