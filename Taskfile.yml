version: "3"

vars:
  E2E_API_URL: https://localhost:8443
  E2E_FRONT_URL: https://localhost:9000
  FEATURES_PATH: ../features
  COMPOSE_FILE: docker/integration/docker-compose.yml
  COMPOSE_ENV: docker/integration/local.env

tasks:
  e2e:install:
    desc: Install E2E test dependencies
    dir: tests/e2e
    cmd: npm install

  e2e:
    desc: Run E2E tests locally (requires frontend on localhost:9000)
    dir: tests/e2e
    deps: [e2e:install]
    env:
      CYPRESS_FEATURES_PATH: "{{.FEATURES_PATH}}"
      E2E_API_URL: "{{.E2E_API_URL}}"
      E2E_FRONT_URL: "{{.E2E_FRONT_URL}}"
    cmd: npm run start

  e2e:ui:
    desc: Open Cypress UI for interactive testing
    dir: tests/e2e
    deps: [e2e:install]
    env:
      CYPRESS_FEATURES_PATH: "{{.FEATURES_PATH}}"
      E2E_API_URL: "{{.E2E_API_URL}}"
      E2E_FRONT_URL: "{{.E2E_FRONT_URL}}"
    cmd: npm run start:ui

  e2e:lint:
    desc: Lint Gherkin feature files
    dir: tests/e2e
    cmd: npx gherkin-lint "{{.FEATURES_PATH}}/**/*.feature"

  e2e:spec:
    desc: "Run specific test(s) - usage: task e2e:spec -- ../features/Health.feature"
    dir: tests/e2e
    deps: [e2e:install]
    env:
      CYPRESS_FEATURES_PATH: "{{.FEATURES_PATH}}"
      E2E_API_URL: "{{.E2E_API_URL}}"
      E2E_FRONT_URL: "{{.E2E_FRONT_URL}}"
    cmd: npx cypress run --spec "{{.CLI_ARGS}}"

  e2e:docker:
    desc: Run E2E tests in Docker (CI mode, requires linid-integration-network)
    cmd: |
      docker run --rm \
        -e E2E_API_URL=https://api:8443 \
        -e E2E_FRONT_URL=https://ui \
        -e CYPRESS_FEATURES_PATH=/app/features \
        -e TZ=Europe/Paris \
        --network linid-integration-network \
        -v "$(pwd)/tests/features":/app/features \
        vincentmoittie/e2e-test-runner:latest

  setup:certs:
    desc: Generate all certificates and keys for dev and integration environments
    cmds:
      # API keystore
      - rm -f api/src/main/resources/keystore.jks
      - keytool -genkeypair -v -alias mykey
        -dname "CN=Test, OU=Test, O=Test, L=Test, S=Test, C=FR"
        -keystore api/src/main/resources/keystore.jks
        -storepass password -keypass password
        -keyalg RSA -keysize 2048 -validity 3650
      # Development SSL certificate
      - openssl req -x509 -newkey rsa:2048
        -keyout docker/dev/resources/llng/ssl/selfsigned.key
        -out docker/dev/resources/llng/ssl/selfsigned.crt
        -days 3650 -nodes
        -subj "/CN=Test/OU=Test/O=Test/L=Test/ST=Test/C=FR"
      # Integration SSL certificate
      - openssl req -x509 -newkey rsa:2048
        -keyout docker/integration/resources/selfsigned.key
        -out docker/integration/resources/selfsigned.crt
        -days 3650 -nodes
        -subj "/CN=Test/OU=Test/O=Test/L=Test/ST=Test/C=FR"
      # OIDC signing keys (dev)
      - openssl genpkey -algorithm RSA
        -out docker/dev/resources/llng/conf/oidc.key
        -pkeyopt rsa_keygen_bits:2048
      - openssl pkey
        -in docker/dev/resources/llng/conf/oidc.key
        -pubout -out docker/dev/resources/llng/conf/oidc.pub
      # OIDC signing keys (integration)
      - openssl genpkey -algorithm RSA
        -out docker/integration/resources/oidc.key
        -pkeyopt rsa_keygen_bits:2048
      - openssl pkey
        -in docker/integration/resources/oidc.key
        -pubout -out docker/integration/resources/oidc.pub
