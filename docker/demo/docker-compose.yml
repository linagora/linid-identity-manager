name: linid_demo

services:
  db:
    image: postgres:18.3-alpine
    container_name: db
    networks:
      - linid-demo-network
    environment:
      POSTGRES_USER: ${DATABASE_ADMIN_USER}
      POSTGRES_PASSWORD: ${DATABASE_ADMIN_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - ${DATABASE_PORT}:5432
    volumes:
      - ./resources/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
      - ./resources/init_lemonldap_db.sql:/docker-entrypoint-initdb.d/init_lemonldap_db.sql
    healthcheck:
      test: ["CMD-SHELL", "psql -U $$POSTGRES_USER -d $$POSTGRES_DB -c 'SELECT 1' || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 5

  api:
    image: linid-identity-manager-api
    container_name: api
    networks:
      - linid-demo-network
    extra_hosts:
      - "linid.localtest.me:host-gateway"
    ports:
      - 8443:8443
    environment:
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_ADMIN_USER=${DATABASE_ADMIN_USER}
      - DATABASE_ADMIN_PASSWORD=${DATABASE_ADMIN_PASSWORD}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - SWAGGER_ENABLED=${SWAGGER_ENABLED}
      - LOGGING_LEVEL=${LOGGING_LEVEL}
      - AUTH_ISSUER_URI=${AUTH_ISSUER_URI}
      - AUTH_JWK_SET_URI=${AUTH_JWK_SET_URI}
      - SSL_KEY_STORE=${SSL_KEY_STORE}
      - SSL_KEY_PASSWORD=${SSL_KEY_PASSWORD}
      - SSL_TRUSTSTORE_PATH=${SSL_TRUSTSTORE_PATH}
      - SSL_TRUSTSTORE_PASSWORD=${SSL_TRUSTSTORE_PASSWORD}
    volumes:
      - ./resources/truststore.jks:/etc/ssl/truststore.jks:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "--no-check-certificate",
          "https://localhost:8443/actuator/health",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      auth:
        condition: service_healthy
      db:
        condition: service_healthy

  ui:
    image: linid-identity-manager-ui
    container_name: ui
    networks:
      - linid-demo-network
    ports:
      - 9000:443
    volumes:
      - ./resources/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./resources/selfsigned.crt:/etc/nginx/certs/selfsigned.crt:ro
      - ./resources/selfsigned.key:/etc/nginx/certs/selfsigned.key:ro
#      - ./resources/design:/usr/share/nginx/html/design:ro
#      - ./resources/config.json:/usr/share/nginx/html/config.json:ro
#      - ./resources/theme-style.css:/usr/share/nginx/html/theme-style.css:ro
#      - ./resources/i18n.json:/usr/share/nginx/html/i18n.json:ro
#      - ./resources/front-i18n/en-US.json:/usr/share/nginx/html/i18n/en-US.json:ro
#      - ./resources/front-i18n/fr-FR.json:/usr/share/nginx/html/i18n/fr-FR.json:ro
      - ./resources/modules.json:/usr/share/nginx/html/modules.json:ro
      - ./resources/remotes.json:/usr/share/nginx/html/remotes.json:ro
      - ./resources/${CONFIG_DIR}/oidc/conf/oidc-config.json:/usr/share/nginx/html/oidc-config.json:ro
    depends_on:
      catalog-ui:
        condition: service_started
      api:
        condition: service_healthy
      auth:
        condition: service_healthy

  catalog-ui:
    image: catalog-ui
    container_name: catalog-ui
    networks:
      - linid-demo-network
    volumes:
      - ./resources/nginx-modules.conf:/etc/nginx/nginx.conf:ro

  auth:
    image: lemonldapng/lemonldap-ng:2.22.2
    container_name: lemon
    networks:
      - linid-demo-network
    environment:
      SSODOMAIN: ${LEMONLDAP_SSO_DOMAIN}
      PORTAL_HOSTNAME: ${LEMONLDAP_PORTAL_HOSTNAME}
    ports:
      - ${LEMONLDAP_PORTAL_PORT}:80
    volumes:
      - ./resources/llng/conf:/var/lib/lemonldap-ng/conf
      - ./resources/oidc.key:/etc/keys/oidc.key:ro
      - ./resources/oidc.pub:/etc/keys/oidc.pub:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "--header=Host: ${LEMONLDAP_PORTAL_HOSTNAME}", "http://127.0.0.1/portal/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

networks:
  linid-demo-network:
    name: linid-demo-network
    driver: bridge
