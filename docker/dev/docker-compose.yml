name: linid_dev

services:
  db:
    image: postgres:18.3-alpine
    container_name: db
    networks:
      - linid-dev-network
    environment:
      POSTGRES_USER: ${DATABASE_ADMIN_USER}
      POSTGRES_PASSWORD: ${DATABASE_ADMIN_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - ${DATABASE_PORT}:5432
    volumes:
      - ./resources/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
      - ./resources/init_lemonldap_db.sql:/docker-entrypoint-initdb.d/init_lemonldap_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_ADMIN_USER}"]
      interval: 2s
      timeout: 5s
      retries: 5

  auth:
    image: lemonldap-ng
    networks:
      - linid-dev-network
    environment:
      PORTAL_HOSTNAME: ${LEMONLDAP_PORTAL_HOSTNAME}
      LEMONLDAP_DATABASE_ADMIN_USER: ${LEMONLDAP_DATABASE_ADMIN_USER}
      LEMONLDAP_DATABASE_ADMIN_PASSWORD: ${LEMONLDAP_DATABASE_ADMIN_PASSWORD}
      LEMONLDAP_DATABASE_USER: ${LEMONLDAP_DATABASE_USER}
      LEMONLDAP_DATABASE_PASSWORD: ${LEMONLDAP_DATABASE_PASSWORD}
      LEMONLDAP_DATABASE_NAME: ${LEMONLDAP_DATABASE_NAME}
    ports: 
      - ${LEMONLDAP_PORTAL_PORT}:443
    volumes:
      - ./resources/llng/conf:/var/lib/lemonldap-ng/conf
      - ./resources/ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./resources/selfsigned.crt:/etc/nginx/ssl/selfsigned.crt:ro
      - ./resources/selfsigned.key:/etc/nginx/ssl/selfsigned.key:ro
      - ./resources/oidc.key:/etc/keys/oidc.key:ro
      - ./resources/oidc.pub:/etc/keys/oidc.pub:ro
    depends_on:
      db:
        condition: service_healthy

networks:
  linid-dev-network:
    name: linid-dev-network
    driver: bridge
